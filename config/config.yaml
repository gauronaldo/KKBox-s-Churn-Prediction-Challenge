project:
  name: kkbox-churn-prediction
  random_state: 42
  target_col: is_churn
  id_col: msno

paths:
  data_dir: data
  raw_dir: data/raw
  interim_dir: data/interim
  processed_dir: data/processed
  models_dir: models
  reports_dir: reports
  figures_dir: reports/figures
  notebooks_dir: notebooks
  logs_dir: logs

artifacts:
  champion_model_file: champion_model.pkl
  champion_name_file: champion_name.txt
  champion_threshold_file: champion_threshold.txt
  preprocessor_file: preprocessor.pkl
  test_evaluation_file: test_evaluation.csv
  predictions_file: predictions.csv

data_files:
  train: train.csv
  members: members_v3.csv
  transactions: transactions.csv
  user_logs: user_logs.csv
  sample_submission: sample_submission.csv

data_validation:
  required_train_columns:
    - msno
    - is_churn
  required_members_columns:
    - msno
    - city
    - bd
    - gender
    - registered_via
    - registration_init_time
  required_transactions_columns:
    - msno
    - transaction_date
    - membership_expire_date
    - is_cancel
    - payment_plan_days
    - plan_list_price
    - actual_amount_paid
    - is_auto_renew
  required_user_logs_columns:
    - msno
    - date
    - num_25
    - num_50
    - num_75
    - num_985
    - num_100
    - num_unq
    - total_secs

split:
  validation_size: 0.15
  test_size: 0.15
  stratify: true

ingestion:
  backend: duckdb
  chunksize: 200000
  duckdb_threads: 2
  duckdb_memory_limit: 4GB
  duckdb_max_temp_directory_size: 50GB
  duckdb_preserve_insertion_order: false
  duckdb_temp_dir: data/interim/duckdb_tmp

feature_engineering:
  age_min: 7
  age_max: 70
  recent_days_window: 30
  cutoff_date: "2017-01-31"
  recency_decay_windows:
    - 7
    - 14
    - 30
    - 90
  behavior_windows:
    - 7
    - 14
    - 30
  output_file: feature_frame.parquet
  metadata_file: feature_metadata.json
  log_scale_features:
    - total_secs
    - num_unq
    - num_100
    - num_25

eda:
  preview_rows: 5
  top_categories: 10
  correlation_min_abs: 0.05
  figure_dpi: 150

analysis:
  top_k_features: 30
  lift_top_fraction: 0.1
  shap_sample_size: null
  shap_chunk_size: 5000
  shap_beeswarm_sample_size: 5000
  shap_max_display: 20
  shap_figure_dpi: 150
  auto_renew_ablation_report_file: auto_renew_ablation.csv
  auto_renew_ablation_feature_patterns:
    - auto_renew
    - cancel_rate
    - retention_rate_from_transactions

modeling:
  candidate_models:
    - logistic_regression
    - random_forest
    - xgboost
    - lightgbm
  use_optuna_candidate: true
  champion_metric: auc_pr
  decision_threshold: 0.5
  decision_threshold_metric: f2
  decision_threshold_grid_step: 0.01

logistic_regression:
  solver: lbfgs
  C: 1.0
  max_iter: 1000

xgboost:
  n_estimators: 1000
  learning_rate: 0.03
  max_depth: 6
  subsample: 0.8
  colsample_bytree: 0.8
  tree_method: hist
  eval_metric: aucpr
  early_stopping_rounds: 100
  log_eval_period: 0
  n_jobs: -1

lightgbm:
  metric: average_precision
  n_estimators: 1000
  learning_rate: 0.03
  num_leaves: 31
  max_depth: -1
  min_child_samples: 50
  reg_alpha: 0.1
  reg_lambda: 1.0
  subsample: 0.8
  colsample_bytree: 0.8
  early_stopping_rounds: 100
  log_eval_period: 0

random_forest:
  n_estimators: 300
  max_depth: 15
  min_samples_split: 2
  min_samples_leaf: 30
  n_jobs: -1
  class_weight: balanced_subsample

optuna:
  n_trials: 20
  timeout: null
  direction: maximize
  metric: auc_pr
  tune_top_k: true
  top_k_min: 10
  top_k_max: 100
  top_k_step: 5
  verbose_eval: 0
  show_progress_bar: false
  log_level: warning
  early_stopping_rounds: 50
  num_boost_round: 1000

mlflow:
  experiment_name: kkbox-churn-prediction
  tracking_uri: null
