project:
  name: kkbox-churn-prediction
  random_state: 42
  target_col: is_churn
  id_col: msno

paths:
  data_dir: data
  raw_dir: data/raw
  interim_dir: data/interim
  processed_dir: data/processed
  models_dir: models
  reports_dir: reports
  figures_dir: reports/figures
  notebooks_dir: notebooks
  logs_dir: logs

data_files:
  train: train.csv
  members: members_v3.csv
  transactions: transactions.csv
  user_logs: user_logs.csv
  sample_submission: sample_submission.csv

data_validation:
  required_train_columns:
    - msno
    - is_churn
  required_members_columns:
    - msno
    - city
    - bd
    - gender
    - registered_via
    - registration_init_time
  required_transactions_columns:
    - msno
    - transaction_date
    - membership_expire_date
    - is_cancel
    - payment_plan_days
    - plan_list_price
    - actual_amount_paid
    - is_auto_renew
  required_user_logs_columns:
    - msno
    - date
    - num_25
    - num_50
    - num_75
    - num_985
    - num_100
    - num_unq
    - total_secs

split:
  validation_size: 0.15
  test_size: 0.15
  stratify: true

ingestion:
  chunksize: 500000

feature_engineering:
  age_min: 7
  age_max: 70
  recent_days_window: 30
  # Cutoff date: ALL transactions and logs AFTER this date are excluded.
  # Must be BEFORE the churn observation window begins.
  # KKBox cohort: memberships expire Feb-Mar 2017 -> cutoff = Jan 31, 2017.
  # Using data from the observation window (Feb-Mar 2017) leaks the churn
  # label because non-churners create renewal transactions in that period.
  cutoff_date: "2017-01-31"
  output_file: feature_frame.parquet
  metadata_file: feature_metadata.json
  log_scale_features:
    - total_secs
    - num_unq
    - num_100
    - num_25

modeling:
  candidate_models:
    - logistic_regression
    - random_forest
    - xgboost
    - lightgbm
  champion_metric: auc_pr
  decision_threshold: 0.5

# ── Model hyperparameters ────────────────────────────────────────────────────
# scale_pos_weight (xgboost, lightgbm) is computed dynamically as n_neg/n_pos.
# class_weight (logistic_regression, random_forest) uses sklearn class weights.

logistic_regression:
  # lbfgs: sufficient for 56 features, stable quasi-Newton convergence.
  solver: lbfgs
  # L2 penalty: never zeros out coefficients (unlike L1), every feature
  # contributes a small amount. L1+class_weight='balanced' caused a sparse
  # solution where only the intercept was active, collapsing all predict_proba
  # to ~0.5 and giving an inverted AUC-ROC of 0.43.
  penalty: l2
  # C=0.1: moderate regularisation (10x stronger than default C=1.0).
  # Stronger regularisation stabilises the solution when features are correlated
  # and produces correct coefficient directions with class_weight='balanced'.
  C: 0.1
  max_iter: 1000
  class_weight: balanced

xgboost:
  n_estimators: 1000
  learning_rate: 0.03
  max_depth: 6
  subsample: 0.8
  colsample_bytree: 0.8
  tree_method: hist
  eval_metric: aucpr
  early_stopping_rounds: 100
  log_eval_period: 100

lightgbm:
  metric: auc           # early stopping monitors AUC-ROC (stable, higher=better)
  n_estimators: 1000
  learning_rate: 0.03
  num_leaves: 31
  max_depth: -1
  min_child_samples: 50     # regularisation: min samples per leaf
  reg_alpha: 0.1            # L1 regularisation
  reg_lambda: 1.0           # L2 regularisation
  subsample: 0.8
  colsample_bytree: 0.8
  early_stopping_rounds: 100
  log_eval_period: 100

random_forest:
  n_estimators: 300
  # max_depth 20->15: train/val AUC-PR gap was 0.22 (OVERFIT)
  max_depth: 15
  min_samples_split: 2
  # min_samples_leaf 10->30: stronger leaf regularisation
  min_samples_leaf: 30
  n_jobs: -1
  # balanced_subsample: re-computes class weights per bootstrap sample.
  # Better than 'balanced' (global weights) for RF ensemble methods.
  class_weight: balanced_subsample

optuna:
  n_trials: 50
  timeout: null
  direction: maximize
  metric: auc_pr

mlflow:
  experiment_name: kkbox-churn-prediction
  tracking_uri: null
